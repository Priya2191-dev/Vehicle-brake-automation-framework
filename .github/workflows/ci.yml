name: Vehicle Brake Automation CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pytest with Coverage & Allure
      env:
        PYTHONPATH: ${{ github.workspace }}/src
      run: |
        pytest -v --cov=src --cov-report=xml --alluredir=allure-results

    - name: Run Behave
      env:
        PYTHONPATH: ${{ github.workspace }}/src
      run: |
        behave -f progress -o behave-report.txt

    - name: Generate Allure Report
      run: |
        pip install allure-commandline
        allure generate allure-results --clean -o allure-report

    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |
          allure-report
          behave-report.txt
          plot.png

    - name: Test Summary
      run: echo "All tests executed successfully!"
