name: CI Pipeline

on:
  push:
    branches: [main]
  

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Debug Files
      run: ls -R

    - name: Run Tests
      env:
        PYTHONPATH: ${{ github.workspace }}/src
      run: |
        pytest -v
        behave -v

      
