name: Vehicle Brake Automation CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 2. Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # 3. Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Run Pytest with report
    - name: Run Pytest
      env:
        PYTHONPATH: ${{ github.workspace }}/src
      run: |
        pytest -v --junitxml=pytest-report.xml

    # 5. Run Behave with report
    - name: Run Behave
      env:
        PYTHONPATH: ${{ github.workspace }}/src
      run: |
        behave -f progress -o behave-report.txt

    # 6. Upload test artifacts
    - name: Upload Reports
      uses: actions/upload-artifact@v3
      with:
        name: test-reports
        path: |
          pytest-report.xml
          behave-report.txt
          plot.png

    # 7. Test Summary
    - name: Test Summary
      run: echo "All tests executed successfully!"
